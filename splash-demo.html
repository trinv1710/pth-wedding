<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Splash Demo — chọn kiểu</title>
  <!-- Reuse project fonts (@font-face) -->
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ===== Demo shell (override project body) ===== */
    html, body { overflow: auto !important; margin: 0; background: #efe9e3; }
    * { box-sizing: border-box; }
    body {
      font-family: 'Playfair Display', Baskerville, serif;
      min-height: 100vh;
      padding: 84px 16px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .demo-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center;
      padding: 12px 16px;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(8px);
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .demo-bar b { color: #631717; font-size: 14px; margin-right: 6px; letter-spacing: .04em; }
    .demo-tab {
      font: 600 13px/1 'Playfair Display', serif; letter-spacing: .04em;
      padding: 9px 16px; border-radius: 20px; border: 1.5px solid #d9c3c3;
      background: #fff; color: #631717; cursor: pointer; transition: .18s;
    }
    .demo-tab:hover { border-color: #631717; }
    .demo-tab.active { background: #631717; color: #fff; border-color: #631717; }
    .demo-caption { color: #6b3a3a; font-size: 13px; text-align: center; max-width: 400px; line-height: 1.5; }
    .demo-caption b { color: #631717; }

    /* ===== Phone frame ===== */
    .phone {
      width: 390px; max-width: 94vw; height: 780px; max-height: 82vh;
      border-radius: 40px; overflow: hidden; position: relative;
      box-shadow: 0 30px 70px -20px rgba(0,0,0,.45), 0 0 0 10px #1c1c1e, 0 0 0 11px #333;
      background: #000;
    }
    .stage { position: absolute; inset: 0; display: none; }
    .stage.on { display: block; }

    /* shared splash flex layout inside phone */
    .sp { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 26px; }
    .amp-serif { font-family: 'Playfair Display', serif; font-style: italic; }

    /* ============================================================
       OPTION 1 — CINEMATIC (ảnh cưới nền)
    ============================================================ */
    .c-bg {
      position: absolute; inset: 0;
      background: url('resources/images/image1.jpg') center/cover no-repeat;
      animation: cKen 14s ease-in-out infinite alternate;
    }
    @keyframes cKen { from { transform: scale(1.05); } to { transform: scale(1.18) translateY(-2%); } }
    .c-overlay { position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(20,6,6,.55) 0%, rgba(20,6,6,.15) 35%, rgba(20,6,6,.35) 60%, rgba(20,6,6,.85) 100%); }
    .c-sp { color: #fff; justify-content: flex-end; padding-bottom: 60px; }
    .c-kicker { font-family: 'Playfair Display', serif; letter-spacing: .5em; text-transform: uppercase; font-size: 11px; color: #f0d9a7; opacity: .95; margin-bottom: 18px; animation: cUp .8s .1s both; }
    .c-names { font-family: 'Great Vibes', cursive; font-size: 62px; line-height: .95; text-shadow: 0 3px 20px rgba(0,0,0,.6); animation: cUp .8s .25s both; }
    .c-names .amp { font-family:'Playfair Display',serif; font-style:italic; font-size: 26px; color:#f0d9a7; display:block; margin: 2px 0; }
    .c-line { width: 60px; height: 1px; background: #f0d9a7; margin: 22px 0 16px; opacity:.8; animation: cUp .8s .4s both; }
    .c-date { font-family:'Playfair Display',serif; font-size: 17px; letter-spacing:.28em; color:#f6ecd6; animation: cUp .8s .5s both; }
    .c-cta { margin-top: 30px; font: 600 13px/1 'Playfair Display',serif; letter-spacing:.2em; text-transform:uppercase; color:#3a0808;
      background: linear-gradient(135deg,#f7e3ad,#e9c777); border:0; padding: 14px 34px; border-radius: 30px; cursor:pointer;
      box-shadow: 0 10px 24px -8px rgba(0,0,0,.6); animation: cUp .8s .65s both, bob 2.4s 1s ease-in-out infinite; }
    @keyframes cUp { from{opacity:0; transform: translateY(24px);} to{opacity:1; transform:none;} }

    /* ============================================================
       OPTION 2 — GOLD LUXE (nền tối, chữ vàng, sparkle)
    ============================================================ */
    .g-stage { background: radial-gradient(circle at 50% 20%, #2a211a, #14100c 60%, #0a0806); }
    .g-sp {}
    .g-frame { position: absolute; inset: 22px; border: 1px solid rgba(212,175,110,.35); border-radius: 6px; pointer-events:none; }
    .g-frame::before { content:""; position:absolute; inset:6px; border:1px solid rgba(212,175,110,.15); border-radius:4px; }
    .g-kicker { font-family:'Playfair Display',serif; letter-spacing:.45em; text-transform:uppercase; font-size:11px;
      background: linear-gradient(90deg,#bf9445,#f4d98b,#bf9445); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:26px; }
    .g-orn { color:#d4af6e; letter-spacing:.6em; font-size:14px; margin-bottom:22px; opacity:.8; }
    .g-names { font-family:'Great Vibes',cursive; font-size:58px; line-height:1;
      background: linear-gradient(160deg,#f6e3a8 0%,#d4af6e 40%,#a8792f 70%,#f6e3a8 100%);
      -webkit-background-clip:text; background-clip:text; color:transparent;
      filter: drop-shadow(0 2px 8px rgba(212,175,110,.25)); }
    .g-names .amp { font-family:'Playfair Display',serif; font-style:italic; font-size:24px; color:#d4af6e; -webkit-text-fill-color:#d4af6e; display:block; margin:4px 0; }
    .g-line { display:flex; align-items:center; gap:12px; margin: 26px 0 22px; }
    .g-line span { width:54px; height:1px; background: linear-gradient(90deg,transparent,#d4af6e,transparent); }
    .g-line b { width:6px; height:6px; transform:rotate(45deg); background:#d4af6e; }
    .g-date { font-family:'Playfair Display',serif; letter-spacing:.3em; font-size:18px; color:#e8cf97; }
    .g-label { font-family:'Playfair Display',serif; letter-spacing:.25em; text-transform:uppercase; font-size:10px; color:#9c7b45; margin-bottom:8px; }
    .g-cta { margin-top:34px; font:600 12px/1 'Playfair Display',serif; letter-spacing:.22em; text-transform:uppercase; color:#1a130a;
      background: linear-gradient(135deg,#f4d98b,#c99a45); border:0; padding:14px 36px; border-radius:30px; cursor:pointer;
      box-shadow: 0 8px 22px -8px rgba(212,175,110,.6); animation: bob 2.4s ease-in-out infinite; }
    .sparkle { position:absolute; width:3px; height:3px; border-radius:50%; background:#f4d98b; box-shadow:0 0 6px 1px #f4d98b; opacity:0; animation: twinkle 3s ease-in-out infinite; }
    @keyframes twinkle { 0%,100%{opacity:0; transform:scale(.5);} 50%{opacity:.9; transform:scale(1);} }

    /* ============================================================
       OPTION 3 — ELEGANT MINIMAL (nền sáng)
    ============================================================ */
    .m-stage { background: linear-gradient(180deg,#fdfaf6,#f5ece2); }
    .m-mono { font-family:'Playfair Display',serif; letter-spacing:.12em; font-size:15px; color:#631717; border:1px solid rgba(99,23,23,.35); border-radius:50%; width:64px; height:64px; display:flex; align-items:center; justify-content:center; margin-bottom:34px; animation: mUp .7s .05s both; }
    .m-kicker { font-family:'Playfair Display',serif; letter-spacing:.42em; text-transform:uppercase; font-size:10.5px; color:#a97b7b; margin-bottom:28px; animation: mUp .7s .15s both; }
    .m-name { font-family:'Great Vibes',cursive; font-size:56px; line-height:.9; color:#631717; animation: mUp .7s both; }
    .m-name.n1 { animation-delay:.25s; } .m-name.n2 { animation-delay:.45s; }
    .m-amp { font-family:'Playfair Display',serif; font-style:italic; font-size:22px; color:#c0a0a0; margin:6px 0; animation: mUp .7s .35s both; }
    .m-line { width:1px; height:40px; background:rgba(99,23,23,.3); margin:30px 0; animation: mUp .7s .55s both; }
    .m-date { font-family:'Playfair Display',serif; letter-spacing:.34em; font-size:15px; color:#631717; animation: mUp .7s .6s both; }
    .m-sub { font-family:'Playfair Display',serif; font-size:12px; letter-spacing:.05em; color:#9a6a6a; margin-top:6px; animation: mUp .7s .68s both; }
    .m-cta { margin-top:38px; font:600 12px/1 'Playfair Display',serif; letter-spacing:.22em; text-transform:uppercase; color:#631717; background:transparent; border:1.5px solid #631717; padding:13px 30px; border-radius:0; cursor:pointer; transition:.2s; animation: mUp .7s .75s both; }
    .m-cta:hover { background:#631717; color:#fff; }
    @keyframes mUp { from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:none;} }

    /* ============================================================
       OPTION 4 — BOTANICAL (hoa lá, xanh olive + kem)
    ============================================================ */
    .b-stage { background: radial-gradient(circle at 50% 40%, #fbf7ee, #eef0e2 70%, #e2e6d0); }
    .b-leaf { position:absolute; font-size:64px; opacity:.5; filter: saturate(.7); }
    .b-leaf.tl { top:-6px; left:-6px; transform:rotate(-20deg); animation: sway 6s ease-in-out infinite; }
    .b-leaf.tr { top:-6px; right:-6px; transform:scaleX(-1) rotate(-20deg); animation: sway 6.5s ease-in-out infinite; }
    .b-leaf.bl { bottom:-6px; left:-6px; transform:scaleY(-1) rotate(-20deg); animation: sway 7s ease-in-out infinite; }
    .b-leaf.br { bottom:-6px; right:-6px; transform:scale(-1) rotate(-20deg); animation: sway 6.2s ease-in-out infinite; }
    @keyframes sway { 0%,100%{ rotate:0deg; } 50%{ rotate:4deg; } }
    .b-kicker { font-family:'Playfair Display',serif; letter-spacing:.4em; text-transform:uppercase; font-size:11px; color:#6f7b52; margin-bottom:24px; }
    .b-names { font-family:'Great Vibes',cursive; font-size:58px; line-height:1; color:#4a5a34; }
    .b-names .amp { font-family:'Playfair Display',serif; font-style:italic; font-size:24px; color:#9ca05f; display:block; margin:4px 0; }
    .b-flower { font-size:22px; margin:22px 0 18px; }
    .b-date { font-family:'Playfair Display',serif; letter-spacing:.28em; font-size:17px; color:#5a3f3f; }
    .b-label { font-family:'Playfair Display',serif; letter-spacing:.24em; text-transform:uppercase; font-size:10px; color:#8a9666; margin-bottom:6px; }
    .b-cta { margin-top:32px; font:600 12px/1 'Playfair Display',serif; letter-spacing:.2em; text-transform:uppercase; color:#fff;
      background: linear-gradient(135deg,#7d8a54,#5f6c3d); border:0; padding:14px 34px; border-radius:30px; cursor:pointer;
      box-shadow:0 8px 20px -8px rgba(95,108,61,.6); animation: bob 2.4s ease-in-out infinite; }

    @keyframes bob { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-4px);} }
  </style>
</head>
<body>
  <div class="demo-bar">
    <b>Splash demo:</b>
    <button class="demo-tab active" data-t="cinematic">1 · Cinematic ảnh cưới</button>
    <button class="demo-tab" data-t="gold">2 · Gold luxe nền tối</button>
    <button class="demo-tab" data-t="minimal">3 · Elegant minimal</button>
    <button class="demo-tab" data-t="botanical">4 · Botanical hoa lá</button>
  </div>

  <div class="demo-caption" id="cap"></div>

  <div class="phone">
    <!-- OPTION 1: CINEMATIC -->
    <div class="stage on" data-s="cinematic">
      <div class="c-bg"></div>
      <div class="c-overlay"></div>
      <div class="sp c-sp">
        <div class="c-kicker">Save the date</div>
        <div class="c-names">Quốc Bỡm<span class="amp">&amp;</span>Thị Hậu</div>
        <div class="c-line"></div>
        <div class="c-date">24 · 07 · 2026</div>
        <button class="c-cta">Mở thiệp mời</button>
      </div>
    </div>

    <!-- OPTION 2: GOLD LUXE -->
    <div class="stage" data-s="gold">
      <div class="sp g-stage">
        <div class="g-frame"></div>
        <div class="sparkle" style="top:14%; left:20%; animation-delay:.2s;"></div>
        <div class="sparkle" style="top:22%; right:18%; animation-delay:1.1s;"></div>
        <div class="sparkle" style="top:70%; left:24%; animation-delay:1.8s;"></div>
        <div class="sparkle" style="top:78%; right:26%; animation-delay:.7s;"></div>
        <div class="sparkle" style="top:44%; left:12%; animation-delay:2.3s;"></div>
        <div class="g-kicker">Wedding Invitation</div>
        <div class="g-orn">✦ &nbsp; ✦ &nbsp; ✦</div>
        <div class="g-names">Quốc Bỡm<span class="amp">&amp;</span>Thị Hậu</div>
        <div class="g-line"><span></span><b></b><span></span></div>
        <div class="g-label">Tiệc mừng</div>
        <div class="g-date">24 · 07 · 2026</div>
        <button class="g-cta">Mở thiệp mời</button>
      </div>
    </div>

    <!-- OPTION 3: ELEGANT MINIMAL -->
    <div class="stage" data-s="minimal">
      <div class="sp m-stage">
        <div class="m-mono">Q&amp;H</div>
        <div class="m-kicker">Trân trọng kính mời</div>
        <div class="m-name n1">Quốc Bỡm</div>
        <div class="m-amp">and</div>
        <div class="m-name n2">Thị Hậu</div>
        <div class="m-line"></div>
        <div class="m-date">24 · 07 · 2026</div>
        <div class="m-sub">Sảnh Hướng Dương · Hoàng Diệp</div>
        <button class="m-cta">Mở thiệp mời</button>
      </div>
    </div>

    <!-- OPTION 4: BOTANICAL -->
    <div class="stage" data-s="botanical">
      <div class="sp b-stage">
        <span class="b-leaf tl">🌿</span>
        <span class="b-leaf tr">🌿</span>
        <span class="b-leaf bl">🌿</span>
        <span class="b-leaf br">🌿</span>
        <div class="b-kicker">Save the date</div>
        <div class="b-names">Quốc Bỡm<span class="amp">&amp;</span>Thị Hậu</div>
        <div class="b-flower">🌸</div>
        <div class="b-label">Tiệc mừng</div>
        <div class="b-date">24 · 07 · 2026</div>
        <button class="b-cta">Mở thiệp mời</button>
      </div>
    </div>
  </div>

  <script>
    const caps = {
      cinematic: '<b>Cinematic</b> — ảnh cưới của cặp đôi làm nền, zoom chậm (Ken Burns), chữ trắng + accent vàng gold. Cá nhân hoá cao, ấn tượng ngay. (Ảnh demo là image1.jpg — có thể đổi ảnh khác.)',
      gold: '<b>Gold luxe</b> — nền tối sang trọng, chữ mạ vàng gradient, khung viền mảnh + hạt sparkle lấp lánh. Khác hẳn tông đỏ-kem cũ.',
      minimal: '<b>Elegant minimal</b> — nền sáng, monogram, nhiều khoảng trắng, chữ fade-up từng dòng. Tinh tế, hiện đại, "thở".',
      botanical: '<b>Botanical</b> — tông xanh olive + kem, hoa lá ở góc khẽ lay. Mềm mại, cảm giác vườn cưới. (Emoji 🌿🌸 chỉ là placeholder — bản thật sẽ dùng hình hoa lá watercolor.)'
    };
    const cap = document.getElementById('cap');
    function show(t){
      document.querySelectorAll('.demo-tab').forEach(b=>b.classList.toggle('active', b.dataset.t===t));
      document.querySelectorAll('.stage').forEach(s=>s.classList.remove('on'));
      const el = document.querySelector('.stage[data-s="'+t+'"]');
      // restart to replay entrance animations
      const clone = el.cloneNode(true); el.parentNode.replaceChild(clone, el);
      clone.classList.add('on');
      cap.innerHTML = caps[t];
    }
    document.querySelector('.demo-bar').addEventListener('click', e=>{
      if(e.target.dataset.t) show(e.target.dataset.t);
    });
    cap.innerHTML = caps.cinematic;
  </script>
</body>
</html>
