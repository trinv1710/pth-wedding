<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Print QR – Trí & Lê Wedding</title>
<style>
  /* vietnamese */
  @font-face {
    font-family: 'Great Vibes';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url('resources/fonts/greatvibes1.woff2') format('woff2');
    unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;
  }
  /* latin */
  @font-face {
    font-family: 'Great Vibes';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url('resources/fonts/greatvibes6.woff2') format('woff2');
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }

  :root {
    --primary: #631717;
    --gold: #b8893d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Baskerville, "Times New Roman", serif;
    background: #eee;
    padding: 20px;
  }

  .toolbar {
    max-width: 210mm;
    margin: 0 auto 16px;
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 12px 16px;
    background: white;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .toolbar button {
    background: var(--primary);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
  }
  .toolbar label { font-size: 13px; color: #555; }
  .toolbar input { width: 60px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; }

  .page {
    width: 210mm;
    min-height: 297mm;
    margin: 0 auto 12px;
    background: white;
    padding: 8mm 7mm;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-auto-rows: min-content;
    gap: 3mm;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }

  .card {
    width: 28mm;
    height: 36mm;
    border: 1px dashed #c9a96b;
    border-radius: 2mm;
    padding: 2mm 1.5mm 1.2mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    position: relative;
    background:
      radial-gradient(circle at top left, rgba(99,23,23,0.04), transparent 40%),
      radial-gradient(circle at bottom right, rgba(184,137,61,0.06), transparent 40%),
      white;
  }

  .card::before,
  .card::after {
    content: "";
    position: absolute;
    width: 5mm;
    height: 5mm;
    border: 1px solid var(--primary);
    opacity: 0.5;
  }
  .card::before {
    top: 0.8mm; left: 0.8mm;
    border-right: none;
    border-bottom: none;
    border-top-left-radius: 1.5mm;
  }
  .card::after {
    bottom: 0.8mm; right: 0.8mm;
    border-left: none;
    border-top: none;
    border-bottom-right-radius: 1.5mm;
  }

  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5mm;
  }

  .tagline {
    font-family: Baskerville, "Times New Roman", serif;
    font-size: 4pt;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 2px;
    line-height: 1;
    white-space: nowrap;
    margin-bottom: 1mm;
  }
  .tagline::before,
  .tagline::after {
    content: "\2726"; /* ✦ Black Four Pointed Star */
    color: var(--gold);
    font-size: 5pt;
    line-height: 1;
    flex-shrink: 0;
  }

  .names {
    font-family: 'Great Vibes', cursive;
    font-size: 9pt;
    color: var(--primary);
    line-height: 1;
    white-space: nowrap;
  }

  .qr-wrap {
    width: 22mm;
    height: 22mm;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qr-wrap img {
    width: 22mm;
    height: 22mm;
    display: block;
  }

  .scan-label {
    font-family: 'Great Vibes', cursive;
    font-size: 8pt;
    color: var(--primary);
    line-height: 1;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .scan-label::before,
  .scan-label::after {
    content: "";
    display: inline-block;
    width: 4mm;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold) 30%, var(--gold) 70%, transparent);
  }

  .heart {
    font-size: 5pt;
    color: var(--primary);
    margin: 0 3px;
    vertical-align: middle;
  }

  @media print {
    body { background: white; padding: 0; }
    .toolbar { display: none; }
    .page {
      margin: 0;
      box-shadow: none;
      page-break-after: always;
    }
    .page:last-child { page-break-after: auto; }
  }

  /* Force backgrounds to print (card gradient + scan-me gold line) */
  .card,
  .scan-label::before,
  .scan-label::after {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  @page {
    size: A4;
    margin: 0;
  }
</style>
</head>
<body>

<div class="toolbar">
  <label>Từ: <input type="number" id="from" value="1" min="1"></label>
  <label>Đến: <input type="number" id="to" value="25" min="1"></label>
  <button onclick="render()">Tạo lại</button>
  <button onclick="window.print()">In / Lưu PDF</button>
  <span style="margin-left:auto;color:#888;font-size:12px">Cmd+P để in · QR 3cm × 3cm · ?from=1&to=25</span>
</div>

<div id="pages"></div>

<script>
  const PER_PAGE = 42; // 6 cols × 7 rows

  const params = new URLSearchParams(location.search);
  const urlFrom = parseInt(params.get('from'));
  const urlTo = parseInt(params.get('to'));
  if (!isNaN(urlFrom)) document.getElementById('from').value = urlFrom;
  if (!isNaN(urlTo)) document.getElementById('to').value = urlTo;

  function render() {
    let from = parseInt(document.getElementById('from').value) || 1;
    let to = parseInt(document.getElementById('to').value) || from;
    if (to < from) [from, to] = [to, from];

    const url = new URL(location.href);
    url.searchParams.set('from', from);
    url.searchParams.set('to', to);
    history.replaceState(null, '', url);

    const pagesEl = document.getElementById('pages');
    pagesEl.innerHTML = '';

    let card = 0;
    let page;
    for (let n = from; n <= to; n++) {
      if (card % PER_PAGE === 0) {
        page = document.createElement('div');
        page.className = 'page';
        pagesEl.appendChild(page);
      }
      page.insertAdjacentHTML('beforeend', `
        <div class="card">
          <div class="header">
            <div class="tagline">Thi&#7879;p c&#432;&#7899;i online</div>
            <div class="names">Văn Trí <span class="heart">&#10084;</span> Mỹ Lê</div>
          </div>
          <div class="qr-wrap"><img src="qr/guest${n}.svg" alt="QR ${n}"></div>
          <div class="scan-label">Scan me</div>
        </div>
      `);
      card++;
    }
  }

  render();
</script>

</body>
</html>
